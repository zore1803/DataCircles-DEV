openapi: 3.0.3
info:
  title: DataCircles CRM API
  description: |
    **DataCircles CRM + Invoicing Platform API Documentation**

    A comprehensive multi-tenant CRM and invoicing system with seat-based subscription management, OAuth authentication, and advanced document conversion capabilities.

    ## Key Features
    - Multi-tenant architecture with complete data isolation
    - OAuth 2.0 authentication (Google, Facebook, GitHub, LinkedIn) + Phone OTP
    - Seat-based subscription billing with prorated seat additions
    - Document conversion engine (Invoice ↔ Proforma ↔ Quotation ↔ Delivery Challan)
    - GST tax calculation (IGST/CGST+SGST)
    - Role-based access control (Admin/Staff)
    - Plan-based feature restrictions
    - Bulk import with CSV mapping

    ## Authentication
    All protected endpoints require authentication via:
    - **Bearer Token**: `Authorization: Bearer <jwt_token>` (for OAuth users)
    - **Phone Token**: `x-phone-token: <jwt_token>` (for phone-authenticated users)

    ## Rate Limiting
    - Standard endpoints: 100 requests per 15 minutes per IP
    - OTP endpoints: Special rate limiting to prevent abuse

    ## Pagination
    Most list endpoints support pagination with query parameters:
    - `page`: Page number (default: 1)
    - `limit`: Items per page (default: 20, max: 100)
    - `sort`: Sort field (prefix with `-` for descending)

    ## Multi-Tenancy
    All data operations are automatically scoped to the authenticated user's organization.
  version: 1.0.0
  contact:
    name: DataCircles Support
    email: support@datacircles.in
  license:
    name: Proprietary

servers:
  - url: https://api.datacircles.in/api
    description: Production server
  - url: http://localhost:5000/api
    description: Development server

tags:
  - name: Authentication
    description: User authentication, registration, and session management
  - name: Subscriptions
    description: Subscription plans, billing, and seat management
  - name: Companies
    description: Company/Account management
  - name: Contacts
    description: Contact management
  - name: Deals
    description: Deal pipeline and opportunity management
  - name: Invoices
    description: Tax invoice generation and management
  - name: Proforma Invoices
    description: Proforma invoice management
  - name: Quotations
    description: Quotation/quote management
  - name: Delivery Challans
    description: Delivery challan management
  - name: Document Conversion
    description: Convert between invoice types
  - name: Vendors
    description: Vendor and supplier management
  - name: Tasks
    description: Task management and assignment
  - name: Meetings
    description: Meeting scheduling and management
  - name: Items
    description: Product and service catalog
  - name: Purchases
    description: Purchase management
  - name: Purchase Orders
    description: Purchase order management
  - name: Custom Fields
    description: Organization-specific custom field definitions
  - name: Folders
    description: File organization and folder management
  - name: Notes
    description: Note management for entities
  - name: Kanban
    description: Kanban board and deal pipeline status
  - name: Branding
    description: Organization branding and customization
  - name: Bank Details
    description: Bank account information for invoicing
  - name: Email
    description: Email sending and template management
  - name: Notifications
    description: Notification settings and management
  - name: Call Logs
    description: Call logging and tracking
  - name: Organization
    description: Organization settings and management
  - name: Super Admin
    description: Super admin operations (restricted)
  - name: Global Search
    description: Cross-entity search functionality

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from OAuth or phone authentication
    PhoneToken:
      type: apiKey
      in: header
      name: x-phone-token
      description: JWT token for phone-authenticated users

  schemas:
    # Core Entities
    User:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        profileEmail:
          type: string
        profileUrl:
          type: string
        role:
          type: string
          enum: [admin, staff]
        organization:
          type: string
          format: objectid
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Permission:
      type: object
      properties:
        name:
          type: string
          description: Module name (e.g., "Companies", "Deals")
        permission:
          type: string
          enum: [readonly, read-write]

    Organization:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        code:
          type: string
          description: Unique 6-character join code
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Subscription:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        razorpaySubscriptionId:
          type: string
        razorpayPlanId:
          type: string
        planName:
          type: string
          enum: [starter, growth, business]
        status:
          type: string
          enum:
            [
              created,
              authenticated,
              active,
              paused,
              halted,
              cancelled,
              completed,
              expired,
            ]
        billingCycle:
          type: string
          enum: [monthly, yearly]
        pricePerUser:
          type: number
        userCount:
          type: integer
          description: Total seats purchased
        totalAmount:
          type: number
        currentPeriodStart:
          type: string
          format: date-time
        currentPeriodEnd:
          type: string
          format: date-time
        isTrialActive:
          type: boolean
        trialUsed:
          type: boolean
        isPaymentConfirmed:
          type: boolean

    Company:
      type: object
      required:
        - name
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        industry:
          type: string
        website:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        address:
          $ref: "#/components/schemas/Address"
        profilePicture:
          type: string
        description:
          type: string
        customFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Contact:
      type: object
      required:
        - name
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        company:
          type: string
          format: objectid
        jobTitle:
          type: string
        lifecycleStage:
          type: string
          enum: [Lead, MQL, SQL, Opportunity, Customer, Evangelist]
        avatar:
          type: string
        address:
          $ref: "#/components/schemas/Address"
        customFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Deal:
      type: object
      required:
        - title
        - amount
      properties:
        _id:
          type: string
          format: objectid
        title:
          type: string
        amount:
          type: number
        company:
          type: string
          format: objectid
        contact:
          type: string
          format: objectid
        status:
          type: string
          enum: [Open, Won, Lost]
          default: Open
        probability:
          type: number
          minimum: 0
          maximum: 100
        expectedCloseDate:
          type: string
          format: date
        description:
          type: string
        customFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Invoice:
      type: object
      required:
        - deal
        - invoiceNumber
        - date
        - amount
        - items
      properties:
        _id:
          type: string
          format: objectid
        deal:
          type: string
          format: objectid
        invoiceNumber:
          type: string
          description: Auto-generated (e.g., INV-2023-0001)
        date:
          type: string
          format: date
        dueDate:
          type: string
          format: date
        amount:
          type: number
        status:
          type: string
          enum: [Draft, Sent, Paid, Overdue, Cancelled]
        discount:
          $ref: "#/components/schemas/Discount"
        style:
          type: string
          enum: [Classic, Modern, Minimal, Elegant]
          default: Classic
        isTaxInvoice:
          type: boolean
          default: false
        receiverGSTIN:
          type: string
          description: Buyer's GST identification number
        transactionType:
          type: string
          enum: [intra, inter]
          description: Intra-state or Inter-state transaction
        gstRate:
          type: number
          minimum: 0
          maximum: 100
          default: 18
        signature:
          type: string
        signatureType:
          type: string
          enum: [text, upload]
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceLineItem"
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    InvoiceLineItem:
      type: object
      required:
        - name
        - rate
        - quantity
      properties:
        itemId:
          type: string
          format: objectid
        name:
          type: string
        description:
          type: string
        rate:
          type: number
        quantity:
          type: number
          minimum: 1
        hsn:
          type: string
          description: Harmonized System Nomenclature code
        isVariant:
          type: boolean
        parentItemId:
          type: string
          format: objectid
        discountType:
          type: string
          enum: [amount, percentage]
        discount:
          type: number
          minimum: 0

    Vendor:
      type: object
      required:
        - name
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        contactName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        avatar:
          type: string
        address:
          $ref: "#/components/schemas/Address"
        gstin:
          type: string
        panNumber:
          type: string
        bankDetails:
          type: object
          properties:
            accountNumber:
              type: string
            ifscCode:
              type: string
            bankName:
              type: string
            accountHolderName:
              type: string
        customFields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Task:
      type: object
      required:
        - title
        - dueDate
      properties:
        _id:
          type: string
          format: objectid
        title:
          type: string
        description:
          type: string
        dueDate:
          type: string
          format: date-time
        priority:
          type: string
          enum: [Low, Medium, High, Urgent]
          default: Medium
        status:
          type: string
          enum: [Pending, In Progress, Completed, Cancelled]
          default: Pending
        assignedTo:
          type: string
          format: objectid
        relatedTo:
          type: object
          properties:
            type:
              type: string
              enum: [Company, Contact, Deal, Vendor]
            id:
              type: string
              format: objectid
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Meeting:
      type: object
      required:
        - title
        - startTime
        - endTime
      properties:
        _id:
          type: string
          format: objectid
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        location:
          type: string
        meetingLink:
          type: string
          format: uri
        participants:
          type: array
          items:
            type: string
            format: objectid
        organizer:
          type: string
          format: objectid
        status:
          type: string
          enum: [Scheduled, Completed, Cancelled]
          default: Scheduled
        relatedTo:
          type: object
          properties:
            type:
              type: string
              enum: [Company, Vendor]
            id:
              type: string
              format: objectid
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Item:
      type: object
      required:
        - name
        - type
        - sellingPrice
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [product, service]
        category:
          type: string
        sku:
          type: string
        hsn:
          type: string
        purchasePrice:
          type: number
        sellingPrice:
          type: number
        primaryUnit:
          type: string
        taxInclusive:
          type: boolean
          default: true
        isActive:
          type: boolean
          default: true
        isVariant:
          type: boolean
          default: false
        parentItemId:
          type: string
          format: objectid
        variantAttributes:
          type: object
          additionalProperties:
            type: string
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        country:
          type: string
          default: India

    CustomField:
      type: object
      properties:
        name:
          type: string
        value:
          type: string

    Discount:
      type: object
      properties:
        type:
          type: string
          enum: [fixed, percentage]
        value:
          type: number
          minimum: 0

    PaginationResponse:
      type: object
      properties:
        currentPage:
          type: integer
        totalPages:
          type: integer
        totalItems:
          type: integer
        itemsPerPage:
          type: integer
        hasNextPage:
          type: boolean
        hasPrevPage:
          type: boolean

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object

    Success:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object

    ProformaInvoice:
      type: object
      allOf:
        - $ref: "#/components/schemas/Invoice"

    Quotation:
      type: object
      allOf:
        - $ref: "#/components/schemas/Invoice"

    DeliveryChallan:
      type: object
      allOf:
        - $ref: "#/components/schemas/Invoice"

    Payment:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        vendor:
          type: string
          format: objectid
        amount:
          type: number
        date:
          type: string
          format: date
        paymentMethod:
          type: string
        reference:
          type: string
        notes:
          type: string
        createdAt:
          type: string
          format: date-time

    Purchase:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        vendor:
          type: string
          format: objectid
        purchaseNumber:
          type: string
        date:
          type: string
          format: date
        amount:
          type: number
        status:
          type: string
          enum: [Pending, Completed, Cancelled]
        items:
          type: array
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    PurchaseOrder:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        vendor:
          type: string
          format: objectid
        orderNumber:
          type: string
        date:
          type: string
          format: date
        amount:
          type: number
        status:
          type: string
          enum: [Draft, Sent, Confirmed, Cancelled]
        items:
          type: array
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    Folder:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        files:
          type: array
          items:
            type: object
        links:
          type: array
          items:
            type: object
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    Note:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        content:
          type: string
        relatedTo:
          type: object
          properties:
            type:
              type: string
              enum: [Company, Contact, Deal]
            id:
              type: string
              format: objectid
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    KanbanBoard:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        statuses:
          type: array
          items:
            type: string
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    Branding:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        companyName:
          type: string
        logo:
          type: string
        address:
          $ref: "#/components/schemas/Address"
        phone:
          type: string
        email:
          type: string
        gstin:
          type: string
        signature:
          type: string
        signatureType:
          type: string
          enum: [text, upload]
        createdAt:
          type: string
          format: date-time

    BankDetails:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        accountNumber:
          type: string
        ifscCode:
          type: string
        bankName:
          type: string
        accountHolderName:
          type: string
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    EmailLog:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        to:
          type: string
        subject:
          type: string
        body:
          type: string
        status:
          type: string
        recipientType:
          type: string
        recipientId:
          type: string
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    EmailTemplate:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        name:
          type: string
        subject:
          type: string
        body:
          type: string
        type:
          type: string
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

    CallLog:
      type: object
      properties:
        _id:
          type: string
          format: objectid
        contact:
          type: string
          format: objectid
        duration:
          type: integer
        type:
          type: string
          enum: [Incoming, Outgoing, Missed]
        notes:
          type: string
        user:
          type: string
          format: objectid
        organization:
          type: string
          format: objectid
        createdAt:
          type: string
          format: date-time

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Items per page
    SortParam:
      name: sort
      in: query
      schema:
        type: string
      description: Sort field (prefix with - for descending)
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource ID

  responses:
    UnauthorizedError:
      description: Unauthorized - Invalid or missing authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ForbiddenError:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

paths:
  # ==========================================
  # AUTHENTICATION ENDPOINTS
  # ==========================================
  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current authenticated user
      description: Returns the currently authenticated user's profile including organization and permissions
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  isTrialActive:
                    type: boolean
                  trialEnd:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/all-user:
    get:
      tags:
        - Authentication
      summary: Get all users in organization
      description: Returns all users (excluding sensitive fields) in the authenticated user's organization
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  allUsers:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/all-user-admin:
    get:
      tags:
        - Authentication
      summary: Get all users (admin only)
      description: Returns all users with full details including permissions. Requires admin role.
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: List of users with full details
          content:
            application/json:
              schema:
                type: object
                properties:
                  allUsers:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /auth/profile:
    get:
      tags:
        - Authentication
      summary: Get user profile picture URL
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: Profile picture URL
          content:
            application/json:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags:
        - Authentication
      summary: Update user profile picture
      security:
        - BearerAuth: []
        - PhoneToken: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profile:
                  type: string
                  format: binary
                profileBase64:
                  type: string
                  description: Base64-encoded image data URL
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /auth/permissions/{id}:
    put:
      tags:
        - Authentication
      summary: Update user permissions (admin only)
      security:
        - BearerAuth: []
        - PhoneToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissions:
                  type: array
                  items:
                    $ref: "#/components/schemas/Permission"
      responses:
        "200":
          description: Permissions updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /auth/invite:
    post:
      tags:
        - Authentication
      summary: Invite user to organization (admin only)
      description: |
        Invite a user by email to join the organization. 
        - If seats available: Creates invite immediately and sends email
        - If seats exhausted: Returns HTTP 402 with payment details for seat addition
      security:
        - BearerAuth: []
        - PhoneToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                permissions:
                  type: array
                  items:
                    $ref: "#/components/schemas/Permission"
      responses:
        "200":
          description: User invited successfully (seats available)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  seatsUsed:
                    type: integer
                  totalSeats:
                    type: integer
        "402":
          description: Payment required for additional seat
          content:
            application/json:
              schema:
                type: object
                properties:
                  requiresPayment:
                    type: boolean
                  message:
                    type: string
                  paymentDetails:
                    type: object
                    properties:
                      key:
                        type: string
                      order_id:
                        type: string
                      amount:
                        type: number
                      currency:
                        type: string
        "400":
          description: User already exists or already invited
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /auth/invite/confirm:
    post:
      tags:
        - Authentication
      summary: Confirm invite payment (admin only)
      description: Called after successful payment for seat addition to confirm invite creation
      security:
        - BearerAuth: []
        - PhoneToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - razorpay_payment_id
                - razorpay_order_id
                - razorpay_signature
              properties:
                razorpay_payment_id:
                  type: string
                razorpay_order_id:
                  type: string
                razorpay_signature:
                  type: string
      responses:
        "200":
          description: Payment confirmed and invite created
        "400":
          description: Invalid payment or user already exists
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /auth/invites:
    get:
      tags:
        - Authentication
      summary: Get all pending invites (admin only)
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: List of pending invites
          content:
            application/json:
              schema:
                type: object
                properties:
                  invites:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        email:
                          type: string
                        permissions:
                          type: array
                          items:
                            $ref: "#/components/schemas/Permission"
                        createdAt:
                          type: string
                          format: date-time
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /auth/invites/{id}:
    delete:
      tags:
        - Authentication
      summary: Delete/revoke an invite (admin only)
      security:
        - BearerAuth: []
        - PhoneToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /auth/delete/{id}:
    delete:
      tags:
        - Authentication
      summary: Delete user (admin only)
      security:
        - BearerAuth: []
        - PhoneToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted successfully
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /auth/send-otp:
    post:
      tags:
        - Authentication
      summary: Send OTP to phone number
      description: |
        Send OTP for phone-based authentication. Rate limited to prevent abuse.
        - 5 requests per phone number per 15 minutes
        - 10 requests per IP per 15 minutes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  description: Phone number with country code (e.g., +919876543210)
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        "429":
          description: Too many OTP requests

  /auth/verify-otp:
    post:
      tags:
        - Authentication
      summary: Verify OTP and get temporary token
      description: |
        Verify the OTP code sent to phone. Returns a temporary JWT token that expires in 1 hour.
        Use this token to complete registration via /auth/complete-registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - otp
              properties:
                phone:
                  type: string
                otp:
                  type: string
      responses:
        "200":
          description: OTP verified, temporary token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                  message:
                    type: string
        "400":
          description: Invalid OTP
        "429":
          description: Too many verification attempts

  /auth/complete-registration:
    post:
      tags:
        - Authentication
      summary: Complete user registration
      description: |
        Complete registration for a new user after OTP verification or OAuth login.
        User can either:
        - Join existing organization via code
        - Accept an invite (matched by email)
        - Create new organization (becomes admin)
      security:
        - BearerAuth: []
        - PhoneToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                  description: Required for phone users
                code:
                  type: string
                  description: Organization join code (6 characters)
                orgName:
                  type: string
                  description: Create new organization with this name
      responses:
        "200":
          description: Registration completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    $ref: "#/components/schemas/User"
                  companyCode:
                    type: string
                    description: Organization code (only if new org created)
                  token:
                    type: string
                    description: New JWT token (for phone users)
        "400":
          description: Invalid data or code not found
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          description: No seats available in organization

  # ==========================================
  # SUBSCRIPTION ENDPOINTS
  # ==========================================
  /subscription/plans:
    get:
      tags:
        - Subscriptions
      summary: Get available subscription plans
      description: Returns all active subscription plans with pricing and features
      responses:
        "200":
          description: List of available plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        planId:
                          type: string
                          enum: [starter, growth, business]
                        name:
                          type: string
                        description:
                          type: string
                        monthlyPrice:
                          type: number
                        yearlyPrice:
                          type: number
                        features:
                          type: object
                          properties:
                            modules:
                              type: object
                            recordsLimit:
                              type: integer
                            emailTemplates:
                              type: integer
                            customFields:
                              type: boolean
                            advancedReporting:
                              type: boolean
                            apiAccess:
                              type: boolean
                        isActive:
                          type: boolean

  /subscription/current:
    get:
      tags:
        - Subscriptions
      summary: Get current subscription
      description: Returns the current subscription details for the authenticated user's organization
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: Current subscription or no subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasSubscription:
                    type: boolean
                  subscription:
                    $ref: "#/components/schemas/Subscription"
                  trialEligible:
                    type: boolean
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /subscription/trial:
    post:
      tags:
        - Subscriptions
      summary: Start free trial (admin only)
      description: Start a 7-day free trial on the Growth plan. Can only be used once per organization.
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: Trial started successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  subscription:
                    $ref: "#/components/schemas/Subscription"
        "400":
          description: Trial already used
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /subscription/create:
    post:
      tags:
        - Subscriptions
      summary: Create new subscription (admin only)
      description: |
        Create a new subscription with Razorpay. Returns payment details for frontend integration.
        Payment must be completed for subscription to become active.
      security:
        - BearerAuth: []
        - PhoneToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - planId
                - billingCycle
                - userCount
              properties:
                planId:
                  type: string
                  enum: [starter, growth, business]
                billingCycle:
                  type: string
                  enum: [monthly, yearly]
                userCount:
                  type: integer
                  minimum: 1
                  description: Number of seats to purchase
      responses:
        "200":
          description: Subscription created, pending payment
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  subscription:
                    $ref: "#/components/schemas/Subscription"
                  paymentDetails:
                    type: object
                    description: Razorpay payment configuration for frontend
        "400":
          description: Invalid plan or organization already has subscription
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /subscription/update:
    put:
      tags:
        - Subscriptions
      summary: Update/upgrade subscription (admin only)
      description: |
        Update subscription plan or seat count. 
        - Upgrades require prorated payment
        - Changes are scheduled for next billing cycle by default
      security:
        - BearerAuth: []
        - PhoneToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                planId:
                  type: string
                  enum: [starter, growth, business]
                billingCycle:
                  type: string
                  enum: [monthly, yearly]
                userCount:
                  type: integer
                  minimum: 1
                immediateUpgrade:
                  type: boolean
                  description: Apply upgrade immediately with proration
      responses:
        "200":
          description: Subscription update initiated
        "400":
          description: Invalid update or no subscription found
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /subscription/cancel:
    post:
      tags:
        - Subscriptions
      summary: Cancel subscription (admin only)
      description: Schedule subscription cancellation at the end of current billing period
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: Cancellation scheduled
        "400":
          description: No active subscription
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /subscription/verify-payment:
    post:
      tags:
        - Subscriptions
      summary: Verify subscription payment (admin only)
      description: Verify Razorpay payment signature and activate subscription
      security:
        - BearerAuth: []
        - PhoneToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - razorpay_payment_id
                - razorpay_subscription_id
                - razorpay_signature
              properties:
                razorpay_payment_id:
                  type: string
                razorpay_subscription_id:
                  type: string
                razorpay_signature:
                  type: string
      responses:
        "200":
          description: Payment verified and subscription activated
        "400":
          description: Invalid signature
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /subscription/payments:
    get:
      tags:
        - Subscriptions
      summary: Get payment history (admin only)
      security:
        - BearerAuth: []
        - PhoneToken: []
      responses:
        "200":
          description: List of subscription payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /subscription/webhook:
    post:
      tags:
        - Subscriptions
      summary: Razorpay webhook handler
      description: |
        Webhook endpoint for Razorpay payment events. 
        This endpoint is called automatically by Razorpay - not for manual use.
        Handles: payment.authorized, subscription.charged, subscription.cancelled, etc.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
        "400":
          description: Invalid webhook data

